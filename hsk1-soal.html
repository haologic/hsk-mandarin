<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HSK 1 — Latihan Soal</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --vermillion: #E63946;
      --vermillion-light: #fdecea;
      --ink: #1a1a2e;
      --ink-soft: #3d3d5c;
      --muted: #6b7280;
      --green: #16a34a;
      --green-light: #dcfce7;
      --red: #dc2626;
      --red-light: #fee2e2;
      --gold: #c9a85c;
      --bg: #f8f7f4;
      --bg-card: #ffffff;
      --border: #e5e7eb;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
    }
    .navbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
    }
    .navbar-brand span { color: var(--vermillion); }
    .navbar-links {
      display: flex;
      align-items: center;
      gap: 8px;
      list-style: none;
    }
    .navbar-links a {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all .18s ease;
    }
    .navbar-links a:hover { background: var(--bg); color: var(--ink); }
    .navbar-links a.nav-cta { background: var(--vermillion); color: #fff; font-weight: 600; }
    .navbar-links a.nav-cta:hover { background: #c0303c; }

    /* BREADCRUMB */
    .breadcrumb {
      padding: 12px 28px;
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .breadcrumb a { color: var(--muted); text-decoration: none; transition: color .15s; }
    .breadcrumb a:hover { color: var(--vermillion); }
    .breadcrumb span { color: var(--ink); font-weight: 500; }

    /* PAGE HEADER */
    .page-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #2c2c4a 60%, #3a2020 100%);
      color: #fff;
      padding: 52px 28px 48px;
      text-align: center;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    .page-header h1 em { font-style: normal; color: #e8a0a0; }
    .page-header p {
      font-size: 1rem;
      opacity: .8;
      max-width: 560px;
      margin: 0 auto;
    }

    /* MAIN CONTENT */
    .page-body { max-width: 860px; margin: 0 auto; padding: 36px 20px 80px; }

    /* BAB SELECTOR */
    .bab-selector-section { margin-bottom: 36px; }
    .bab-selector-title {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .bab-selector {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
    }
    .bab-btn {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 8px;
      cursor: pointer;
      text-align: center;
      transition: all .2s;
      font-family: 'DM Sans', sans-serif;
      position: relative;
    }
    .bab-btn:hover {
      border-color: var(--vermillion);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .bab-btn.active {
      background: var(--vermillion);
      border-color: var(--vermillion);
      color: #fff;
    }
    .bab-btn.completed {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }
    .bab-btn.completed.active {
      background: var(--green);
      color: #fff;
    }
    .bab-btn-num {
      font-size: 0.72rem;
      font-weight: 600;
      opacity: .6;
      margin-bottom: 3px;
    }
    .bab-btn-title {
      font-size: 0.75rem;
      font-weight: 500;
      line-height: 1.3;
    }
    .bab-btn-check {
      display: none;
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 0.7rem;
      background: var(--green);
      color: #fff;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .bab-btn.completed .bab-btn-check { display: flex; }

    /* QUIZ CONTAINER */
    .soal-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    /* Empty state */
    .soal-empty {
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
    }
    .soal-empty .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .soal-empty p { font-size: 1rem; }

    /* Progress bar */
    .soal-progress {
      background: var(--bg);
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .soal-progress-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink-soft);
      white-space: nowrap;
    }
    .progress-bar-outer {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background: var(--vermillion);
      border-radius: 100px;
      transition: width .4s ease;
    }
    .soal-progress-score {
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Question area */
    .soal-inner { padding: 28px 28px 24px; }

    .soal-type-badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 18px;
      background: rgba(230, 57, 70, .1);
      color: var(--vermillion);
      border: 1px solid rgba(230, 57, 70, .2);
    }
    .soal-type-badge.type-b {
      background: rgba(201, 168, 92, .1);
      color: #a07030;
      border-color: rgba(201, 168, 92, .3);
    }
    .soal-type-badge.type-c {
      background: rgba(26, 107, 74, .08);
      color: #1a6b4a;
      border-color: rgba(26, 107, 74, .2);
    }

    /* Chinese text */
    .soal-text {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 500;
      color: var(--ink);
      line-height: 1.5;
      margin-bottom: 8px;
      letter-spacing: .02em;
    }

    /* Paragraph box for type B */
    .soal-paragraph {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1rem;
      line-height: 1.9;
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 4px solid var(--gold);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      margin-bottom: 18px;
      color: var(--ink-soft);
    }

    /* Question text */
    .soal-ask {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* Options */
    .soal-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .soal-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all .18s;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      width: 100%;
    }
    .soal-option:hover:not(.disabled) {
      border-color: var(--vermillion);
      background: var(--vermillion-light);
    }
    .soal-option.correct {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }
    .soal-option.wrong {
      border-color: var(--red);
      background: var(--red-light);
      color: var(--red);
    }
    .soal-option.disabled { cursor: not-allowed; }
    .option-label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--border);
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      transition: all .18s;
    }
    .soal-option.correct .option-label { background: var(--green); color: #fff; }
    .soal-option.wrong .option-label { background: var(--red); color: #fff; }

    /* Feedback */
    .soal-feedback {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 18px;
      display: none;
    }
    .soal-feedback.correct {
      background: var(--green-light);
      color: var(--green);
      border: 1px solid rgba(22, 163, 74, .2);
      display: block;
    }
    .soal-feedback.wrong {
      background: var(--red-light);
      color: var(--red);
      border: 1px solid rgba(220, 38, 38, .2);
      display: block;
    }

    /* Type C - Word arrangement */
    .word-chips-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .word-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .word-chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      transition: all .18s;
      color: var(--ink);
    }
    .word-chip:hover:not(.used) {
      border-color: var(--vermillion);
      background: var(--vermillion-light);
      color: var(--vermillion);
    }
    .word-chip.used {
      opacity: .35;
      cursor: not-allowed;
      background: var(--bg);
      pointer-events: none;
    }
    .answer-area-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .answer-area {
      min-height: 58px;
      background: var(--bg);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
      transition: border-color .18s;
    }
    .answer-area.has-words { border-color: var(--gold); border-style: solid; }
    .answer-area .word-chip {
      border-color: var(--gold);
      background: rgba(201, 168, 92, .1);
      cursor: pointer;
      pointer-events: auto;
      opacity: 1;
    }
    .answer-area .word-chip:hover { border-color: var(--red); background: var(--red-light); color: var(--red); }
    .answer-placeholder {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
    }
    .type-c-actions { display: flex; gap: 10px; margin-bottom: 16px; }

    /* Button styles */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 22px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: none;
      transition: all .18s;
    }
    .btn-primary { background: var(--vermillion); color: #fff; }
    .btn-primary:hover { background: #c0303c; }
    .btn-primary:disabled { background: var(--muted); cursor: not-allowed; opacity: .6; }
    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 2px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--muted); color: var(--ink); }
    .btn-green { background: var(--green); color: #fff; }
    .btn-green:hover { background: #14803d; }
    .btn-next {
      background: var(--ink);
      color: #fff;
      margin-top: 4px;
    }
    .btn-next:hover { background: #2c3e50; }

    /* Results screen */
    .results-screen {
      padding: 52px 28px 48px;
      text-align: center;
    }
    .score-circle-wrap { margin-bottom: 24px; }
    .results-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      margin-bottom: 6px;
      color: var(--ink);
    }
    .results-percent {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--vermillion);
      margin-bottom: 6px;
    }
    .results-msg {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .results-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* Kunci Jawaban */
    .kunci-section {
      margin-top: 32px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .kunci-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink);
      transition: background .15s;
    }
    .kunci-toggle:hover { background: var(--bg); }
    .kunci-arrow { transition: transform .25s; font-size: 0.8rem; display: inline-block; }
    .kunci-toggle.open .kunci-arrow { transform: rotate(180deg); }
    .kunci-content { display: none; padding: 0 24px 24px; }
    .kunci-content.open { display: block; }
    .kunci-list { list-style: none; }
    .kunci-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      align-items: flex-start;
    }
    .kunci-item:last-child { border-bottom: none; }
    .kunci-num { font-weight: 700; color: var(--muted); min-width: 30px; flex-shrink: 0; }
    .kunci-q { color: var(--ink-soft); flex: 1; line-height: 1.4; }
    .kunci-a { font-weight: 600; color: var(--green); flex-shrink: 0; max-width: 200px; text-align: right; }
    .kunci-a.type-c { color: #a07030; font-family: 'Noto Sans SC', sans-serif; font-size: 0.85rem; }

    @media (max-width: 640px) {
      .page-body { padding: 20px 12px 60px; }
      .soal-inner { padding: 18px 16px; }
      .bab-selector { grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 8px; }
      .navbar { padding: 0 16px; }
      .soal-text { font-size: 1.4rem; }
      .results-actions { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">汉<span>语</span> HSK</a>
    <ul class="navbar-links">
      <li><a href="menu.html">Menu</a></li>
      <li><a href="hsk1-materi.html">Materi</a></li>
      <li><a href="hsk1-soal.html" class="nav-cta">Latihan</a></li>
    </ul>
  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <a href="menu.html">Menu</a>
    <span>›</span>
    <a href="menu.html">HSK 1</a>
    <span>›</span>
    <span>Latihan Soal</span>
  </div>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <h1>HSK 1 — <em>Latihan Soal</em></h1>
    <p>20 bab latihan, masing-masing 40 soal. Total 800 soal untuk menguji pemahamanmu.</p>
  </header>

  <!-- MAIN BODY -->
  <main class="page-body">

    <!-- BAB SELECTOR -->
    <section class="bab-selector-section">
      <div class="bab-selector-title">Pilih Bab untuk Mulai</div>
      <div class="bab-selector" id="babSelector"></div>
    </section>

    <!-- QUIZ AREA -->
    <div class="soal-container" id="soalContainer">
      <div class="soal-empty">
        <div class="icon">📖</div>
        <p>Pilih bab di atas untuk memulai latihan.</p>
      </div>
    </div>

    <!-- KUNCI JAWABAN -->
    <section class="kunci-section" id="kunciSection" style="display:none;">
      <button class="kunci-toggle" id="kunciToggle" onclick="toggleKunci()">
        <span>Lihat Kunci Jawaban</span>
        <span class="kunci-arrow">▼</span>
      </button>
      <div class="kunci-content" id="kunciContent">
        <ul class="kunci-list" id="kunciList"></ul>
      </div>
    </section>

  </main>

  <script>
    // Auth check
    if (sessionStorage.getItem('hsk_auth') !== 'true') {
      window.location.href = 'menu.html';
    }

ds":["下雨","了","今天"],"answer":"今天下雨了。"},{"type":"C","words":["工作","做","什么","你"],"answer":"你做什么工作？"}]}];

    // ─── STATE ───────────────────────────────────────
    let currentBab     = null;
    let currentQuestions = [];
    let currentIndex   = 0;
    let score          = 0;
    let answered       = false;
    let selectedWords  = [];   // array of {word, id}
    let availableWords = [];   // array of {word, id, used}
    let completedBabs  = new Set(
      JSON.parse(sessionStorage.getItem('hsk1_completed') || '[]')
    );

    // ─── BAB SELECTOR ────────────────────────────────
    function initBabSelector() {
      const sel = document.getElementById('babSelector');
      sel.innerHTML = '';
      SOAL_DATA.forEach((bab, i) => {
        const isCompleted = completedBabs.has(i);
        const isActive    = currentBab === i;
        const btn = document.createElement('button');
        btn.className = 'bab-btn'
          + (isCompleted ? ' completed' : '')
          + (isActive    ? ' active'    : '');
        btn.onclick = () => selectBab(i);
        const shortTitle = bab.title.replace(/^Bab \d+ — /, '');
        btn.innerHTML =
          '<div class="bab-btn-num">Bab ' + bab.bab + '</div>' +
          '<div class="bab-btn-title">' + shortTitle + '</div>' +
          '<div class="bab-btn-check">✓</div>';
        sel.appendChild(btn);
      });
    }

    // ─── SELECT BAB ──────────────────────────────────
    function selectBab(idx) {
      currentBab       = idx;
      currentQuestions = SOAL_DATA[idx].questions;
      currentIndex     = 0;
      score            = 0;
      answered         = false;
      selectedWords    = [];
      availableWords   = [];
      initBabSelector();
      renderQuiz();
      buildKunci(idx);
      document.getElementById('kunciSection').style.display = 'block';
      // Close kunci
      const toggle  = document.getElementById('kunciToggle');
      const content = document.getElementById('kunciContent');
      toggle.classList.remove('open');
      content.classList.remove('open');
      // Scroll to quiz
      document.getElementById('soalContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ─── RENDER QUESTION ─────────────────────────────
    function renderQuiz() {
      const container = document.getElementById('soalContainer');
      const q         = currentQuestions[currentIndex];
      const total     = currentQuestions.length;
      const pct       = (currentIndex / total) * 100;
      const labels    = ['A', 'B', 'C', 'D'];

      let inner = '';

      if (q.type === 'A') {
        inner =
          '<div class="soal-type-badge">Bagian A — Baca Kalimat</div>' +
          '<div class="soal-text">' + esc(q.text) + '</div>' +
          '<div class="soal-ask">' + esc(q.ask) + '</div>' +
          '<div class="soal-options" id="optionsArea">' +
          q.options.map((opt, i) =>
            '<button class="soal-option" onclick="checkAnswer(' + i + ')" data-idx="' + i + '">' +
            '<span class="option-label">' + labels[i] + '</span>' +
            '<span>' + esc(opt) + '</span></button>'
          ).join('') +
          '</div>';

      } else if (q.type === 'B') {
        inner =
          '<div class="soal-type-badge type-b">Bagian B — Membaca</div>' +
          '<div class="soal-paragraph">' + esc(q.paragraph) + '</div>' +
          '<div class="soal-ask">' + esc(q.text || q.ask) + '</div>' +
          '<div class="soal-options" id="optionsArea">' +
          q.options.map((opt, i) =>
            '<button class="soal-option" onclick="checkAnswer(' + i + ')" data-idx="' + i + '">' +
            '<span class="option-label">' + labels[i] + '</span>' +
            '<span>' + esc(opt) + '</span></button>'
          ).join('') +
          '</div>';

      } else if (q.type === 'C') {
        // Shuffle words
        const shuffled = [...q.words]
          .map((w, i) => ({ word: w, id: i, used: false }))
          .sort(() => Math.random() - 0.5);
        availableWords = shuffled;
        selectedWords  = [];

        inner =
          '<div class="soal-type-badge type-c">Bagian C — Susun Kalimat</div>' +
          '<div class="soal-ask">Susun kata-kata berikut menjadi kalimat yang benar:</div>' +
          '<div class="word-chips-label">Kata tersedia (klik untuk memilih):</div>' +
          '<div class="word-chips" id="wordChips">' +
          availableWords.map(w =>
            '<button class="word-chip" id="chip_' + w.id + '" onclick="handleWordClick(' + w.id + ')">' +
            esc(w.word) + '</button>'
          ).join('') +
          '</div>' +
          '<div class="answer-area-label">Kalimatmu:</div>' +
          '<div class="answer-area" id="answerArea">' +
          '<span class="answer-placeholder" id="answerPlaceholder">Klik kata-kata di atas untuk menyusun kalimat...</span>' +
          '</div>' +
          '<div class="type-c-actions">' +
          '<button class="btn btn-primary" id="checkSentenceBtn" onclick="checkSentence()">Periksa</button>' +
          '<button class="btn btn-outline" onclick="resetWords()">Reset</button>' +
          '</div>';
      }

      container.innerHTML =
        '<div class="soal-progress">' +
          '<span class="soal-progress-label">Soal ' + (currentIndex + 1) + ' / ' + total + '</span>' +
          '<div class="progress-bar-outer"><div class="progress-bar-inner" style="width:' + pct + '%"></div></div>' +
          '<span class="soal-progress-score">Benar: ' + score + '</span>' +
        '</div>' +
        '<div class="soal-inner">' +
          inner +
          '<div class="soal-feedback" id="soalFeedback"></div>' +
          '<button class="btn btn-next" id="nextBtn" style="display:none;" onclick="nextQuestion()">Lanjut →</button>' +
        '</div>';

      answered = false;
    }

    // ─── ESCAPE HTML ─────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ─── CHECK ANSWER (Type A & B) ───────────────────
    function checkAnswer(selectedIdx) {
      if (answered) return;
      answered = true;
      const q    = currentQuestions[currentIndex];
      const opts = document.querySelectorAll('.soal-option');
      opts.forEach(o => o.classList.add('disabled'));

      const feedback = document.getElementById('soalFeedback');
      if (selectedIdx === q.correct) {
        score++;
        opts[selectedIdx].classList.add('correct');
        feedback.className  = 'soal-feedback correct';
        feedback.textContent = '✓ Benar! Jawaban yang tepat.';
      } else {
        opts[selectedIdx].classList.add('wrong');
        opts[q.correct].classList.add('correct');
        feedback.className  = 'soal-feedback wrong';
        feedback.textContent = '✗ Salah. Jawaban yang benar: ' + q.options[q.correct];
      }
      document.getElementById('nextBtn').style.display = 'inline-flex';
    }

    // ─── WORD CLICK (Type C) ─────────────────────────
    function handleWordClick(wordId) {
      const w = availableWords.find(x => x.id === wordId);
      if (!w || w.used) return;
      w.used = true;
      selectedWords.push({ word: w.word, id: w.id });
      const chip = document.getElementById('chip_' + wordId);
      if (chip) chip.classList.add('used');
      renderAnswerArea();
    }

    function renderAnswerArea() {
      const area = document.getElementById('answerArea');
      if (!area) return;
      if (selectedWords.length === 0) {
        area.innerHTML = '<span class="answer-placeholder">Klik kata-kata di atas untuk menyusun kalimat...</span>';
        area.classList.remove('has-words');
      } else {
        area.classList.add('has-words');
        area.innerHTML = selectedWords.map(w =>
          '<button class="word-chip" onclick="removeWord(' + w.id + ')">' + esc(w.word) + '</button>'
        ).join('');
      }
    }

    function removeWord(wordId) {
      const idx = selectedWords.findIndex(x => x.id === wordId);
      if (idx === -1) return;
      selectedWords.splice(idx, 1);
      const w = availableWords.find(x => x.id === wordId);
      if (w) w.used = false;
      const chip = document.getElementById('chip_' + wordId);
      if (chip) chip.classList.remove('used');
      renderAnswerArea();
    }

    function resetWords() {
      selectedWords = [];
      availableWords.forEach(w => {
        w.used = false;
        const chip = document.getElementById('chip_' + w.id);
        if (chip) chip.classList.remove('used');
      });
      renderAnswerArea();
      const fb = document.getElementById('soalFeedback');
      if (fb) { fb.className = 'soal-feedback'; fb.textContent = ''; }
      const btn = document.getElementById('checkSentenceBtn');
      if (btn) { btn.textContent = 'Periksa'; btn.disabled = false; }
      const nextBtn = document.getElementById('nextBtn');
      if (nextBtn) nextBtn.style.display = 'none';
      answered = false;
      // Reset answer area chip styles
      const area = document.getElementById('answerArea');
      if (area) area.querySelectorAll('.word-chip').forEach(c => c.removeAttribute('style'));
    }

    // ─── CHECK SENTENCE (Type C) ─────────────────────
    function checkSentence() {
      if (answered) return;
      if (selectedWords.length === 0) {
        alert('Pilih kata-kata terlebih dahulu!');
        return;
      }
      answered = true;
      const q          = currentQuestions[currentIndex];
      const userAnswer = selectedWords.map(w => w.word).join('');
      const normalize  = s => s.replace(/[。？！，、；：""''()（）\s]/g, '');
      const isCorrect  = normalize(userAnswer) === normalize(q.answer);

      const feedback = document.getElementById('soalFeedback');
      const btn      = document.getElementById('checkSentenceBtn');
      if (btn) btn.disabled = true;

      const area = document.getElementById('answerArea');
      if (isCorrect) {
        score++;
        feedback.className  = 'soal-feedback correct';
        feedback.textContent = '✓ Benar! Kalimat yang tepat: ' + q.answer;
        if (area) area.querySelectorAll('.word-chip').forEach(c => {
          c.style.borderColor = 'var(--green)';
          c.style.background  = 'var(--green-light)';
          c.style.color       = 'var(--green)';
        });
      } else {
        feedback.className  = 'soal-feedback wrong';
        feedback.textContent = '✗ Kurang tepat. Jawaban yang benar: ' + q.answer;
        if (area) area.querySelectorAll('.word-chip').forEach(c => {
          c.style.borderColor = 'var(--red)';
          c.style.background  = 'var(--red-light)';
          c.style.color       = 'var(--red)';
        });
      }
      document.getElementById('nextBtn').style.display = 'inline-flex';
    }

    // ─── NEXT QUESTION ───────────────────────────────
    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= currentQuestions.length) {
        showResults();
      } else {
        renderQuiz();
        document.getElementById('soalContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // ─── RESULTS ─────────────────────────────────────
    function showResults() {
      const total = currentQuestions.length;
      const pct   = Math.round((score / total) * 100);
      let msg = '', emoji = '';
      if (pct >= 90)      { msg = 'Luar biasa! Kemampuanmu sangat bagus!'; emoji = '🏆'; }
      else if (pct >= 70) { msg = 'Bagus! Terus berlatih ya!';             emoji = '👍'; }
      else                { msg = 'Jangan menyerah! Coba lagi pasti bisa!'; emoji = '💪'; }

      completedBabs.add(currentBab);
      sessionStorage.setItem('hsk1_completed', JSON.stringify([...completedBabs]));
      initBabSelector();

      const radius = 54;
      const circ   = 2 * Math.PI * radius;
      const dash   = (pct / 100) * circ;
      const color  = pct >= 90 ? '#16a34a' : pct >= 70 ? '#c9a85c' : '#E63946';

      document.getElementById('soalContainer').innerHTML =
        '<div class="results-screen">' +
          '<div class="score-circle-wrap">' +
            '<svg width="148" height="148" viewBox="0 0 148 148">' +
              '<circle cx="74" cy="74" r="' + radius + '" fill="none" stroke="#e5e7eb" stroke-width="10"/>' +
              '<circle cx="74" cy="74" r="' + radius + '" fill="none" stroke="' + color + '" stroke-width="10"' +
                ' stroke-dasharray="' + dash + ' ' + (circ - dash) + '"' +
                ' stroke-linecap="round"' +
                ' transform="rotate(-90 74 74)"' +
              '/>' +
              '<text x="74" y="66" text-anchor="middle" font-family="Playfair Display, serif" font-size="28" font-weight="700" fill="#1a1a2e">' + score + '</text>' +
              '<text x="74" y="88" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="13" fill="#6b7280">/ ' + total + ' Benar</text>' +
            '</svg>' +
          '</div>' +
          '<div class="results-title">' + emoji + ' Selesai!</div>' +
          '<div class="results-percent">' + pct + '%</div>' +
          '<div class="results-msg">' + msg + '</div>' +
          '<div class="results-actions">' +
            '<button class="btn btn-outline" onclick="selectBab(' + currentBab + ')">↺ Coba Lagi</button>' +
            '<button class="btn btn-primary" onclick="backToSelector()">← Pilih Bab Lain</button>' +
          '</div>' +
        '</div>';

      document.getElementById('soalContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ─── BACK TO SELECTOR ────────────────────────────
    function backToSelector() {
      currentBab = null;
      document.getElementById('soalContainer').innerHTML =
        '<div class="soal-empty"><div class="icon">📖</div><p>Pilih bab di atas untuk memulai latihan.</p></div>';
      document.getElementById('kunciSection').style.display = 'none';
      initBabSelector();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ─── BUILD KUNCI JAWABAN ─────────────────────────
    function buildKunci(babIdx) {
      const questions = SOAL_DATA[babIdx].questions;
      const labels    = ['A', 'B', 'C', 'D'];
      const list      = document.getElementById('kunciList');
      list.innerHTML  = questions.map((q, i) => {
        let ansText = '', aClass = 'kunci-a';
        if (q.type === 'A' || q.type === 'B') {
          ansText = labels[q.correct] + '. ' + q.options[q.correct];
        } else {
          ansText = q.answer;
          aClass  = 'kunci-a type-c';
        }
        const qRaw = (q.type === 'C')
          ? ('Susun: ' + q.words.join(' | '))
          : (q.ask || q.text || '');
        const qShort = qRaw.length > 70 ? qRaw.substring(0, 70) + '…' : qRaw;
        return '<li class="kunci-item">' +
          '<span class="kunci-num">' + (i + 1) + '.</span>' +
          '<span class="kunci-q">' + esc(qShort) + '</span>' +
          '<span class="' + aClass + '">' + esc(ansText) + '</span>' +
        '</li>';
      }).join('');
    }

    // ─── TOGGLE KUNCI ────────────────────────────────
    function toggleKunci() {
      document.getElementById('kunciToggle').classList.toggle('open');
      document.getElementById('kunciContent').classList.toggle('open');
    }

    // ─── INIT ────────────────────────────────────────
    initBabSelector();
  </script>
</body>
</html>
